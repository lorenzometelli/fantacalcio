<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ypoooooooo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Antonio:wght@700&family=Plus+Jakarta+Sans:ital,wght@0,400;1,700&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        /* Contenitore principale del post (proporzioni 4:5 tipiche di Instagram) */
        .post-container {
            position: relative;
            width: 400px;
            height: 500px;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Immagine di sfondo */
        .post-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Sfumatura nera dal basso per garantire la leggibilità del testo */
        .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 65%;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.95) 20%, rgba(0, 0, 0, 0.4) 60%, rgba(0, 0, 0, 0) 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 24px;
        }

        /* Logo in alto a destra (Simulato) */
        .brand-logo {
    position: absolute;
    top: 15px;
    right: 15px;
    width: 40px; /* Leggermente più grande per rendere visibile l'immagine */
    height: 40px;
    border: 2px solid #00ff66; /* Mantiene il cerchio verde tipico di Cronache */
    border-radius: 50%;
    object-fit: cover; /* Evita che la foto si schiacci o si storca */
    background-color: #fff; /* Sfondo bianco per far risaltare il logo */
}

        /* Blocco testo principale */
        .text-block {
            font-family: 'Antonio', sans-serif;
            text-transform: uppercase;
            line-height: 0.9;
            letter-spacing: -0.5px;
            margin-bottom: 15px;
        }

        /* Testo in Giallo */
        .text-highlight {
            color: #F1D441; /* Giallo iconico */
            font-size: 30px;
            display: block;
        }

        /* Testo in Bianco grande */
        .text-main {
            color: #FFFFFF;
            font-size: 50px;
            display: block;
            margin-top: 2px;
        }

        /* Fonte della notizia in basso a destra */
        .source-tag {
            align-self: flex-end;
            font-size: 11px;
            color: #e0e0e0;
            font-style: italic;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        .source-tag strong {
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="post-container">
        <!-- <img class="post-image" src="https://d2lhpso9w1g8dk.cloudfront.net/web/risorse/maglietta_2025/s_13188792_0614246.png" alt="Sfondo post"> -->
        <img class="post-image" src="https://i.imgur.com/NY6vtZK.jpeg" alt="Sfondo post">
       <img class="brand-logo" src="https://www.dandi.media/wp-content/uploads/2016/09/mascotte-big-red-gabibbo.jpg" alt="Logo">

        <div class="overlay">
            <div class="text-block">
                <span class="text-highlight">È fatta: Dieghy confermato come allenatore</span>
                <span class="text-main">della DinoDiegaxy.</span>
            </div>
            <div class="source-tag">FONTE: <strong>EEEEEEL PRIMOOO</strong></div>
        </div>
    </div>

</body>
</html>
